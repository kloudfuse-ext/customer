---
# Java APM Demo
# Image:   maven:3.9-eclipse-temurin-21 (Docker Hub) — Maven manages OTel SDK dependencies.
# SDK:     OpenTelemetry Java SDK (direct, no javaagent) — initialized via AutoConfiguredOpenTelemetrySdk.
# Traces:  OTLP/HTTP → https://<cluster_name>.kloudfuse.io/ingester/otlp/traces (port 443)
# Emits:   one trace/second — "database" SERVER span (parent) + "user" CLIENT span (child)
# Service: demo-java-service
#
# NOTE: first startup takes ~2–3 min while Maven downloads OTel SDK jars (~30 MB total).
#       Subsequent restarts reuse the Maven local repo in /maven-cache (emptyDir).
apiVersion: v1
kind: Pod
metadata:
  name: apm-demo-java
  namespace: steve
  labels:
    app: apm-demo-java
    language: java
spec:
  restartPolicy: Always
  tolerations:
    - key: "owner"
      operator: "Equal"
      value: "steve"
      effect: "NoSchedule"

  volumes:
    - name: maven-cache
      emptyDir: {}

  containers:
    - name: java-app
      image: maven:3.9-eclipse-temurin-21
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          mkdir -p /demo/src/main/java && cd /demo

          # ---- write pom.xml ----
          cat > pom.xml << 'POMEOF'
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0
                   http://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>demo</groupId>
            <artifactId>demo-java-service</artifactId>
            <version>1.0</version>
            <properties>
              <maven.compiler.source>21</maven.compiler.source>
              <maven.compiler.target>21</maven.compiler.target>
              <otel.version>1.40.0</otel.version>
            </properties>
            <dependencies>
              <!-- Autoconfigure reads all OTEL_* env vars to set up the SDK -->
              <dependency>
                <groupId>io.opentelemetry</groupId>
                <artifactId>opentelemetry-sdk-extension-autoconfigure</artifactId>
                <version>${otel.version}</version>
              </dependency>
              <!-- OTLP HTTP exporter (uses OkHttp sender by default) -->
              <dependency>
                <groupId>io.opentelemetry</groupId>
                <artifactId>opentelemetry-exporter-otlp</artifactId>
                <version>${otel.version}</version>
              </dependency>
            </dependencies>
            <build>
              <plugins>
                <!-- Build a fat jar so we can run with plain java -jar -->
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-assembly-plugin</artifactId>
                  <version>3.6.0</version>
                  <configuration>
                    <archive>
                      <manifest>
                        <mainClass>DemoServer</mainClass>
                      </manifest>
                    </archive>
                    <descriptorRefs>
                      <descriptorRef>jar-with-dependencies</descriptorRef>
                    </descriptorRefs>
                  </configuration>
                  <executions>
                    <execution>
                      <id>make-assembly</id>
                      <phase>package</phase>
                      <goals><goal>single</goal></goals>
                    </execution>
                  </executions>
                </plugin>
              </plugins>
            </build>
          </project>
          POMEOF

          # ---- write trace loop application ----
          cat > src/main/java/DemoServer.java << 'JAVACODE'
          import io.opentelemetry.api.GlobalOpenTelemetry;
          import io.opentelemetry.api.trace.Span;
          import io.opentelemetry.api.trace.SpanKind;
          import io.opentelemetry.api.trace.Tracer;
          import io.opentelemetry.context.Scope;
          import io.opentelemetry.sdk.autoconfigure.AutoConfiguredOpenTelemetrySdk;

          public class DemoServer {
              public static void main(String[] args) throws Exception {
                  // Initialize SDK from OTEL_* env vars and register as global.
                  // Reads: OTEL_SERVICE_NAME, OTEL_EXPORTER_OTLP_TRACES_ENDPOINT,
                  //        OTEL_EXPORTER_OTLP_HEADERS, OTEL_EXPORTER_OTLP_PROTOCOL, etc.
                  AutoConfiguredOpenTelemetrySdk.builder()
                          .setResultAsGlobal()
                          .build();

                  Tracer tracer = GlobalOpenTelemetry.getTracer("demo-java-service");
                  System.out.println("demo-java-service starting trace loop (1 trace/second)");

                  while (true) {
                      // "database" SERVER span — root of the trace
                      Span serverSpan = tracer.spanBuilder("database")
                              .setSpanKind(SpanKind.SERVER)
                              .startSpan();
                      try (Scope serverScope = serverSpan.makeCurrent()) {
                          // "user" CLIENT span — child shares the same trace ID
                          Span clientSpan = tracer.spanBuilder("user")
                                  .setSpanKind(SpanKind.CLIENT)
                                  .startSpan();
                          try (Scope clientScope = clientSpan.makeCurrent()) {
                              Thread.sleep(50);
                          } finally {
                              clientSpan.end();
                          }
                      } finally {
                          serverSpan.end();
                      }
                      Thread.sleep(950);
                  }
              }
          }
          JAVACODE

          # ---- compile, package fat jar, and run ----
          mvn -q -Dmaven.repo.local=/maven-cache package
          exec java -jar target/demo-java-service-1.0-jar-with-dependencies.jar
      env:
        # AutoConfiguredOpenTelemetrySdk reads all OTEL_* env vars automatically.
        - name: OTEL_SERVICE_NAME
          value: "demo-java-service"
        # OTEL_EXPORTER_OTLP_TRACES_ENDPOINT sets the exact URL for traces; the SDK
        # does not append /v1/traces when this signal-specific variable is used.
        - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          value: "https://<cluster_name>.kloudfuse.io/ingester/otlp/traces"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"
        - name: OTEL_EXPORTER_OTLP_COMPRESSION
          value: "gzip"
        - name: OTEL_EXPORTER_OTLP_HEADERS
          valueFrom:
            secretKeyRef:
              name: kloudfuse-api-key
              key: value
        - name: OTEL_TRACES_SAMPLER
          value: "parentbased_traceidratio"
        - name: OTEL_TRACES_SAMPLER_ARG
          value: "1.0"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "deployment.environment.name=dev,service.namespace=apm-demo"
      volumeMounts:
        - name: maven-cache
          mountPath: /maven-cache
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
